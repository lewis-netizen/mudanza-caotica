# lefthook.yml
# Pre-commit hooks para Mudanza Caótica.
# Configuración: lefthook.yml (commitear — aplica a todos)
# Overrides locales: lefthook-local.yml (no commitear, en .gitignore)
#
# Activar después de rokit install:
#   lefthook install
#
# Los hooks verifican solo archivos staged (eficiente).
# Si algo falla, el commit se bloquea con el mensaje de error.
#
# Separación CI/IA (§5.0):
#   Estos hooks verifican Nivel 1 y Nivel 2 — contratos deterministas.
#   Lo que requiere juicio queda para el Auditor TECH en CI/PR.
#
# IMPORTANTE: los scripts de los contratos viven en .github/scripts/*.sh —
# NO inline aquí. El runner de lefthook en Windows destroza el quoting de
# scripts multilínea inline (comillas y paréntesis desaparecen). Cualquier
# hook nuevo con lógica no trivial debe ser un archivo de script.

pre-commit:
  # Ejecutar en paralelo para mayor velocidad
  parallel: true

  jobs:
    # ── Nivel 1: Formato ─────────────────────────────────────────────────────

    - name: stylua
      glob: "src/**/*.lua"
      run: stylua --check {staged_files}

    # ── Nivel 1: Linting ─────────────────────────────────────────────────────

    - name: selene
      glob: "src/**/*.lua"
      run: bash .github/scripts/selene-staged.sh {staged_files}

    # ── Nivel 1: Logger obligatorio — print/warn directos prohibidos ─────────

    - name: contract-logger-usage
      glob: "src/**/*.lua"
      run: bash .github/scripts/contract-logger-usage.sh {staged_files}

    # ── Nivel 1: INV-001 — Networking isolation ──────────────────────────────
    # OnClientEvent solo en ClientStateManager (cliente).
    # OnServerEvent solo en CarryManager (servidor). §4.10, DL-029.

    - name: contract-networking-isolation
      glob: "src/**/*.lua"
      run: bash .github/scripts/contract-networking-isolation.sh {staged_files}

    # ── Nivel 1: INV-002 — Audio/VFX isolation ──────────────────────────────

    - name: contract-audio-isolation
      glob: "src/{server,shared}/**/*.lua"
      run: bash .github/scripts/contract-audio-isolation.sh {staged_files}

    # ── Nivel 1: §4.6 — PathfindingService banned ───────────────────────────

    - name: contract-pathfinding-banned
      glob: "src/**/*.lua"
      run: bash .github/scripts/contract-pathfinding-banned.sh {staged_files}

    # ── Nivel 1: §2.4 — .Name as condition banned ───────────────────────────

    - name: contract-name-as-condition
      glob: "src/**/*.lua"
      run: bash .github/scripts/contract-name-as-condition.sh {staged_files}

    # ── Nivel 2: Tamaño de módulo ≤ 400 líneas (DL-033) ─────────────────────

    - name: contract-module-size
      glob: "src/**/*.lua"
      run: bash .github/scripts/contract-module-size.sh {staged_files}

    # ── Nivel 2: Layer separation — server no requiere client ───────────────

    - name: contract-layer-separation
      glob: "src/server/**/*.lua"
      run: bash .github/scripts/contract-layer-separation.sh {staged_files}

    # ── Nivel 2: Persistence modules tienen specs ────────────────────────────

    - name: contract-test-coverage-persistence
      glob: "src/server/Persistence/**/*.lua"
      run: bash .github/scripts/contract-test-coverage-persistence.sh {staged_files}

    # ── Nivel 1: Specs de comportamiento ────────────────────────────────────
    # §5.0 exige que los contratos de Nivel 1 corran en pre-commit Y en CI.
    # Los specs saltan (SKIP) los módulos aún no implementados — no bloquean.

    - name: run-specs
      glob: "src/**/*.lua"
      run: lune run lune/run-specs.luau

    # ── Nivel 1: Compatibilidad Lune (§4.6) ──────────────────────────────────
    # Usa lune/check-compatibility.luau y filtra a los archivos staged.

    - name: contract-lune-compatibility
      glob: "src/{shared,server}/**/*.lua"
      run: bash .github/scripts/contract-lune-compatibility.sh {staged_files}

commit-msg:
  jobs:
    # ── Convención de commits ────────────────────────────────────────────────
    # Verifica formato: tipo(dominio): descripción
    # Tipos válidos: feat, fix, refactor, docs, chore
    # Dominios: gameplay, world, networking, persistence, ui, ux, governance

    - name: commitlint
      run: bash .github/scripts/commitlint-local.sh {1}
