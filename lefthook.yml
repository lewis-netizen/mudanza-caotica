# lefthook.yml
# Pre-commit hooks para Mudanza Caótica.
# Configuración: lefthook.yml (commitear — aplica a todos)
# Overrides locales: lefthook-local.yml (no commitear, en .gitignore)
#
# Activar después de rokit install:
#   lefthook install
#
# Los hooks verifican solo archivos staged (eficiente).
# Si algo falla, el commit se bloquea con el mensaje de error.
#
# Separación CI/IA (§5.0):
#   Estos hooks verifican Nivel 1 y Nivel 2 — contratos deterministas.
#   Lo que requiere juicio queda para el Auditor TECH en CI/PR.

pre-commit:
  # Ejecutar en paralelo para mayor velocidad
  parallel: true

  jobs:
    # ── Nivel 1: Formato ─────────────────────────────────────────────────────

    - name: stylua
      glob: "src/**/*.lua"
      run: stylua --check {staged_files}

    # ── Nivel 1: Linting (incluye print/warn ban via selene.toml) ────────────

    - name: selene
      glob: "src/**/*.lua"
      run: |
        selene generate-roblox-std 2>/dev/null || true
        selene {staged_files}

    # ── Nivel 1: INV-001 — Networking isolation ──────────────────────────────

    - name: contract-networking-isolation
      glob: "src/**/*.lua"
      run: |
        VIOLATIONS=$(grep -n "\.OnClientEvent:Connect\|\.OnServerEvent:Connect" {staged_files} \
          | grep -v "ClientStateManager.lua" \
          | grep -v "Lib/Networking.lua" \
          || true)
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ INV-001: Networking connections outside ClientStateManager.lua"
          echo "$VIOLATIONS"
          echo "See AI_CONTEXT_MASTER §4.10"
          exit 1
        fi

    # ── Nivel 1: INV-002 — Audio/VFX isolation ──────────────────────────────

    - name: contract-audio-isolation
      glob: "src/{server,shared}/**/*.lua"
      run: |
        VIOLATIONS=$(grep -n ":Play()\|:Stop()\|:Pause()" {staged_files} \
          | grep -v "AudioManager\|VFXManager" \
          || true)
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ INV-002: Direct audio/VFX call in gameplay module"
          echo "$VIOLATIONS"
          echo "See AI_CONTEXT_MASTER §4.9"
          exit 1
        fi

    # ── Nivel 1: §4.6 — PathfindingService banned ───────────────────────────

    - name: contract-pathfinding-banned
      glob: "src/**/*.lua"
      run: |
        VIOLATIONS=$(grep -n "PathfindingService" {staged_files} || true)
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ §4.6: PathfindingService found — use TweenService + NPCNodes"
          echo "$VIOLATIONS"
          exit 1
        fi

    # ── Nivel 1: §2.4 — .Name as condition banned ───────────────────────────

    - name: contract-name-as-condition
      glob: "src/**/*.lua"
      run: |
        VIOLATIONS=$(grep -En '\.Name\s*[=~]=\s*"' {staged_files} || true)
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ §2.4: .Name used as logical condition — use IDs"
          echo "$VIOLATIONS"
          exit 1
        fi

    # ── Nivel 2: Tamaño de módulo ≤ 300 líneas ──────────────────────────────

    - name: contract-module-size
      glob: "src/**/*.lua"
      run: |
        VIOLATIONS=""
        for file in {staged_files}; do
          # Excluir specs
          if echo "$file" | grep -q "\.spec\.lua$"; then
            continue
          fi
          LINES=$(wc -l < "$file")
          if [ "$LINES" -gt 300 ]; then
            VIOLATIONS="${VIOLATIONS}\n  $file — ${LINES} lines"
          fi
        done
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ Module size violation: files exceeding 300 lines:"
          echo -e "$VIOLATIONS"
          echo "Split into smaller modules with single responsibilities."
          exit 1
        fi

    # ── Nivel 2: Layer separation — server no requiere client ───────────────

    - name: contract-layer-separation
      glob: "src/server/**/*.lua"
      run: |
        VIOLATIONS=$(grep -n "require.*[Cc]lient\|require.*StarterPlayer" {staged_files} || true)
        if [ -n "$VIOLATIONS" ]; then
          echo "❌ Layer violation: src/server/ requires src/client/ module"
          echo "$VIOLATIONS"
          echo "See AI_CONTEXT_MASTER §4.2"
          exit 1
        fi

    # ── Nivel 2: Persistence modules tienen specs ────────────────────────────

    - name: contract-test-coverage-persistence
      glob: "src/server/Persistence/**/*.lua"
      run: |
        MISSING=""
        for file in {staged_files}; do
          module=$(basename "$file" .lua)
          spec="src/shared/Tests/${module}.spec.lua"
          if [ ! -f "$spec" ]; then
            MISSING="${MISSING}\n  ${module}: spec missing at ${spec}"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo "❌ Test coverage: Persistence module without spec:"
          echo -e "$MISSING"
          exit 1
        fi

    # ── Nivel 1: Compatibilidad Lune ────────────────────────────────────────
    # Usa lune/check-compatibility.luau — verificación exacta, no heurística.
    # Solo corre sobre archivos staged en src/shared/ y src/server/.
    # Análisis estático via lune/check-compatibility.luau.
    # El script lee los archivos directamente — sin require(), sin problemas de paths.
    # Filtra el output para mostrar solo los archivos staged que fallen.

    - name: contract-lune-compatibility
      glob: "src/{shared,server}/**/*.lua"
      run: |
        OUTPUT=$(lune run lune/check-compatibility.luau 2>&1 || true)
        FOUND_VIOLATIONS=""
        for file in {staged_files}; do
          if echo "$file" | grep -q "\.spec\.lua$"; then
            continue
          fi
          if echo "$OUTPUT" | grep -q "$file"; then
            FOUND_VIOLATIONS="${FOUND_VIOLATIONS}\n  $file"
          fi
        done
        if [ -n "$FOUND_VIOLATIONS" ]; then
          echo "❌ Lune compatibility: Roblox globals at module scope in staged files:"
          echo -e "$FOUND_VIOLATIONS"
          echo ""
          echo "Move Roblox service access inside functions (inyección de dependencias)."
          echo "Full report: lune run lune/check-compatibility.luau"
          echo "See AI_CONTEXT_MASTER §4.6"
          exit 1
        fi

commit-msg:
  jobs:
    # ── Convención de commits ────────────────────────────────────────────────
    # Verifica formato: tipo(dominio): descripción
    # Tipos válidos: feat, fix, refactor, docs, chore
    # Dominios válidos: gameplay, world, networking, persistence, ui, ux, governance

    - name: commitlint
      run: |
        MSG=$(cat {1})
        # Commits de sync automático del bot — exentos
        if echo "$MSG" | grep -q "^chore(governance): sync "; then
          exit 0
        fi
        # Validar formato
        if ! echo "$MSG" | grep -qE "^(feat|fix|refactor|docs|chore)\((gameplay|world|networking|persistence|ui|ux|governance)\): .+"; then
          echo "❌ Commit message format violation"
          echo "   Got: $MSG"
          echo "   Expected: tipo(dominio): descripción"
          echo "   Types: feat | fix | refactor | docs | chore"
          echo "   Scopes: gameplay | world | networking | persistence | ui | ux | governance"
          exit 1
        fi
