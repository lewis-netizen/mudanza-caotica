# sync-tickets.yml
# Sincroniza el estado de los tickets del GitHub Project hacia TICKETS.md.
# Dirección: Project → TICKETS.md (unidireccional).
# TICKETS.md es generado — no editar manualmente.
#
# IMPORTANTE: usa la API GraphQL de Projects v2, no la API REST de
# Projects Classic (deprecada, no funciona con proyectos creados hoy).
#
# Prerequisitos (ver .github/PROJECT_SETUP.md sección 6):
#   1. Repo variable PROJECT_NUMBER — el número del Project (visible en su URL)
#   2. Repo secret PROJECTS_TOKEN — PAT CLÁSICO con scope "read:project".
#      Los fine-grained tokens no exponen permiso de Projects para cuentas
#      de usuario (solo para organizaciones). El GITHUB_TOKEN automático de
#      Actions tampoco puede leer Projects v2 — limitación de GitHub.
#   3. (Recomendado) Repo secret SYNC_BOT_TOKEN — token SOLO de repositorio,
#      sin Projects: fine-grained con Contents RW + Pull requests RW (sí
#      disponible en cuentas personales), o un PAT clásico con scope "repo".
#      Sin él, el PR de sync se crea igual pero no dispara checks/automerge
#      (limitación del GITHUB_TOKEN) y se usa el respaldo de este workflow.
#
# Flujo (DL-030): el sync NUNCA pushea a main. Escribe la rama
# bot/sync-tickets, abre un PR etiquetado (class:b, domain:tech) y
# automerge-sync.yml lo mergea si el diff toca solo docs/TICKETS.md.
# Compatible con branch protection sin excepciones de bot.
#
# Triggers:
#   - Cron cada 6 horas: sincronización automática periódica
#   - workflow_dispatch: sincronización manual via gh workflow run sync-tickets.yml

name: Sync GitHub Project → TICKETS.md

on:
  schedule:
    - cron: '0 */6 * * *' # cada 6 horas — el board cambia pocas veces al día
  workflow_dispatch:        # manual: gh workflow run sync-tickets.yml

jobs:
  sync-tickets:
    name: Sync Project → TICKETS.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Con SYNC_BOT_TOKEN los pushes/PRs del bot disparan workflows
          # (checks de p2 + automerge-sync). El GITHUB_TOKEN de fallback
          # funciona, pero GitHub no dispara workflows sobre sus eventos.
          # SYNC_BOT_TOKEN NO necesita acceso a Projects — ver PROJECT_SETUP §6.5.
          token: ${{ secrets.SYNC_BOT_TOKEN || github.token }}

      # ── Leer estado del Project v2 via GraphQL ──────────────────────────────
      # Usa PROJECTS_TOKEN (PAT clásico con scope read:project) — GITHUB_TOKEN no alcanza.
      - name: Fetch Project v2 items via GraphQL
        id: fetch
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const projectNumber = parseInt('${{ vars.PROJECT_NUMBER }}', 10);

            if (!projectNumber) {
              core.setFailed(
                'La variable de repo PROJECT_NUMBER no está configurada. ' +
                'Ver .github/PROJECT_SETUP.md sección 6.'
              );
              return;
            }

            // repositoryOwner + fragmentos User/Organization: funciona igual
            // si el repo vive en una cuenta de usuario (caso actual) o si
            // algún día migra a una organización.
            const query = `
              query($owner: String!, $number: Int!, $cursor: String) {
                repositoryOwner(login: $owner) {
                  ... on User { projectV2(number: $number) { ...projectItems } }
                  ... on Organization { projectV2(number: $number) { ...projectItems } }
                }
              }
              fragment projectItems on ProjectV2 {
                items(first: 100, after: $cursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    content {
                      ... on Issue { title number }
                    }
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                      }
                    }
                  }
                }
              }`;

            const stateMap = {
              'TODO': 'TODO', 'Todo': 'TODO',
              'IN_PROGRESS': 'IN_PROGRESS', 'In Progress': 'IN_PROGRESS',
              'BLOCKED': 'BLOCKED', 'Blocked': 'BLOCKED',
              'DONE': 'DONE', 'Done': 'DONE',
            };

            let cursor = null;
            let hasNextPage = true;
            const ticketStates = {};

            while (hasNextPage) {
              let result;
              try {
                result = await github.graphql(query, { owner, number: projectNumber, cursor });
              } catch (err) {
                core.setFailed(
                  `GraphQL query failed: ${err.message}. ` +
                  `Verifica que PROJECTS_TOKEN es un PAT clásico con scope read:project ` +
                  `y que PROJECT_NUMBER es correcto.`
                );
                return;
              }

              const ownerNode = result.repositoryOwner;
              const project = ownerNode && ownerNode.projectV2;
              if (!project) {
                core.setFailed(`Project número ${projectNumber} no encontrado para ${owner}.`);
                return;
              }

              for (const item of project.items.nodes) {
                if (!item.content || !item.content.title) continue;

                const match = item.content.title.match(/^([A-Z]+-\d+)/);
                if (!match) continue; // Issue sin formato de ticket — se ignora

                const statusField = item.fieldValues.nodes.find(
                  fv => fv.field && fv.field.name === 'Status'
                );
                if (!statusField) continue;

                const estado = stateMap[statusField.name] || statusField.name.toUpperCase();
                ticketStates[match[1]] = estado;
              }

              hasNextPage = project.items.pageInfo.hasNextPage;
              cursor = project.items.pageInfo.endCursor;
            }

            core.setOutput('ticket_states', JSON.stringify(ticketStates));
            core.info(`Encontrados ${Object.keys(ticketStates).length} ticket(s) en el Project.`);

      # ── Actualizar campo Estado en TICKETS.md ───────────────────────────────
      - name: Update TICKETS.md
        id: update
        uses: actions/github-script@v9
        env:
          # Via env — interpolar el output dentro del literal JS rompería
          # el script si algún valor contiene comillas.
          TICKET_STATES: ${{ steps.fetch.outputs.ticket_states }}
        with:
          script: |
            const fs = require('fs');
            const ticketStates = JSON.parse(process.env.TICKET_STATES || '{}');

            if (Object.keys(ticketStates).length === 0) {
              core.info('No hay estados que sincronizar.');
              return;
            }

            let content = fs.readFileSync('docs/TICKETS.md', 'utf8');
            let changed = false;
            const updatedIds = [];

            for (const [ticketId, newState] of Object.entries(ticketStates)) {
              const regex = new RegExp(
                `(### ${ticketId}[\\s\\S]*?Estado:\\s+)(TODO|IN_PROGRESS|BLOCKED|DONE)`,
                'g'
              );
              content = content.replace(regex, (match, prefix, currentState) => {
                if (currentState !== newState) {
                  changed = true;
                  updatedIds.push(`${ticketId}: ${currentState} → ${newState}`);
                  return `${prefix}${newState}`;
                }
                return match;
              });
            }

            if (changed) {
              fs.writeFileSync('docs/TICKETS.md', content);
              core.setOutput('changed', 'true');
              core.setOutput('updated_ids', updatedIds.join(', '));
              core.info(`Actualizado: ${updatedIds.join(', ')}`);
            } else {
              core.setOutput('changed', 'false');
              core.info('Sin cambios — TICKETS.md ya está sincronizado.');
            }

      # ── Commit a rama de bot — NUNCA push directo a main (DL-030) ───────────
      # La rama bot/sync-tickets se fuerza en cada sync: solo contiene el
      # delta vigente de TICKETS.md. El merge lo hace automerge-sync.yml.
      - name: Commit and push sync branch
        if: steps.update.outputs.changed == 'true'
        env:
          UPDATED_IDS: ${{ steps.update.outputs.updated_ids }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B bot/sync-tickets
          git add docs/TICKETS.md
          git commit -m "chore(governance): sync TICKETS.md → ${UPDATED_IDS}"
          git push -f origin bot/sync-tickets

      # ── Crear (o reutilizar) el PR de sync ───────────────────────────────────
      # Con SYNC_BOT_TOKEN (fine-grained: Contents RW + Pull requests RW) el PR
      # dispara los checks de p2 y automerge-sync.yml. Con el GITHUB_TOKEN de
      # fallback, GitHub NO dispara workflows sobre el PR — por eso el paso
      # siguiente arma el automerge como respaldo desde este mismo run.
      - name: Create or reuse sync PR
        if: steps.update.outputs.changed == 'true'
        id: pr
        uses: actions/github-script@v9
        env:
          UPDATED_IDS: ${{ steps.update.outputs.updated_ids }}
        with:
          github-token: ${{ secrets.SYNC_BOT_TOKEN || github.token }}
          script: |
            const head = `${context.repo.owner}:bot/sync-tickets`;
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
            });

            let pr;
            if (existing.length > 0) {
              pr = existing[0];
              core.info(`PR de sync ya abierto — actualizado con el push: #${pr.number}`);
            } else {
              const today = new Date().toISOString().split('T')[0];
              const { data: created } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `chore(governance): sync TICKETS.md — ${today}`,
                head: 'bot/sync-tickets',
                base: 'main',
                body: [
                  'Sincronización automática GitHub Project → TICKETS.md (campo Estado).',
                  '',
                  `**Cambios:** ${process.env.UPDATED_IDS}`,
                  '',
                  '_PR generado por sync-tickets.yml. Merge automático via automerge-sync.yml',
                  '(solo si el diff toca exclusivamente docs/TICKETS.md)._',
                ].join('\n'),
              });
              pr = created;
              // Labels requeridos por validate-pr-labels (p2)
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['domain:tech', 'class:b'],
              });
              core.info(`PR de sync creado: ${pr.html_url}`);
            }
            core.setOutput('number', pr.number.toString());

      # ── Automerge de respaldo (caso GITHUB_TOKEN, ver arriba) ────────────────
      - name: Enable automerge (backup)
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_BOT_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge --auto --squash "$PR_NUMBER" -R "${{ github.repository }}" \
            || gh pr merge --squash "$PR_NUMBER" -R "${{ github.repository }}" \
            || echo "::notice::Automerge no armado — revisar 'Allow auto-merge' en Settings → General."
