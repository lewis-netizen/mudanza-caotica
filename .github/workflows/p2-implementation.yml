# p2-implementation.yml
# Triggered on every PR against main.
#
# Separación CI/IA:
#   CI verifica contratos expresables como condiciones binarias.
#   IA verifica lo que requiere juicio.
#   Si un contrato está en CI, el Issue de Codex no lo repite.
#
# Jobs:
#   Contratos de estructura (grep/AST)
#     contract-networking-isolation
#     contract-audio-isolation
#     contract-pathfinding-banned
#     contract-name-as-condition-banned
#     contract-remote-event-count
#     contract-logger-usage (print/warn ban)
#   Convención y formato
#     format-check (StyLua)
#     lint-check (Selene)
#     validate-commit-convention (commitlint)
#     validate-pr-labels
#   Notificaciones
#     notify-self-review
#     create-codex-audit-issue (post-merge, class:a)

name: P2 — Implementation Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  pull_request_target:
    types: [closed]

# Mínimo privilegio por defecto — los jobs que crean issues/comentarios
# elevan permisos individualmente.
permissions:
  contents: read

# Cancela runs obsoletos del mismo PR cuando llegan pushes nuevos.
concurrency:
  group: p2-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # BLOQUE 1 — CONTRATOS DE ESTRUCTURA
  # Cada job verifica un contrato de arquitectura expresable como condición
  # binaria. Si falla, el PR no puede mergearse. No requiere juicio de IA.
  # ══════════════════════════════════════════════════════════════════════════════

  # INV-001
  # Contrato: Networking.*:Connect() solo aparece en ClientStateManager.lua
  contract-networking-isolation:
    name: "Contract: Networking isolation (INV-001)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify RemoteEvent connections live in their single owners
        run: |
          # OnClientEvent → solo ClientStateManager (cliente).
          # OnServerEvent → solo CarryManager (servidor; InteractObject es el
          # único evento cliente→servidor). Ver §4.3/§4.10, DL-029.
          V1=$(grep -rn "\.OnClientEvent:Connect\|\.Event:Connect" src/ \
            --include="*.lua" \
            | grep -v "src/client/ClientStateManager.lua" \
            | grep -v "src/shared/Lib/Networking.lua" \
            || true)
          V2=$(grep -rn "\.OnServerEvent:Connect" src/ \
            --include="*.lua" \
            | grep -v "src/server/CarryManager.lua" \
            | grep -v "src/shared/Lib/Networking.lua" \
            || true)
          if [ -n "$V1$V2" ]; then
            echo "❌ INV-001 VIOLATION: Networking connection outside its single owner"
            echo "$V1"
            echo "$V2"
            echo ""
            echo "OnClientEvent → ClientStateManager.lua | OnServerEvent → CarryManager.lua"
            echo "See AI_CONTEXT_MASTER §4.10"
            exit 1
          fi
          echo "✅ INV-001: Networking isolation verified"

  # INV-002
  # Contrato: sound:Play() y VFX directos no aparecen en módulos de gameplay
  contract-audio-isolation:
    name: "Contract: Audio/VFX isolation (INV-002)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify no direct sound:Play() or VFX in gameplay modules
        run: |
          # Excluir futuros AudioManager y VFXManager cuando existan.
          # Los tweens también se excluyen: TweenService es el mecanismo
          # mandatado para el NPC (§4.4) y tween:Play() no es audio/VFX.
          VIOLATIONS=$(grep -rn ":Play()\|:Stop()\|:Pause()" src/server/ src/shared/ \
            --include="*.lua" \
            | grep -v "AudioManager\|VFXManager\|[Tt]ween" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ INV-002 VIOLATION: Direct audio/VFX calls in gameplay modules"
            echo "$VIOLATIONS"
            echo ""
            echo "Audio and VFX must react to RemoteEvents, never called from gameplay directly."
            echo "See AI_CONTEXT_MASTER §4.9"
            exit 1
          fi
          echo "✅ INV-002: Audio/VFX isolation verified"

  # §4.6
  # Contrato: PathfindingService no aparece en src/
  contract-pathfinding-banned:
    name: "Contract: PathfindingService banned (§4.6)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify PathfindingService is not used
        run: |
          VIOLATIONS=$(grep -rn "PathfindingService" src/ --include="*.lua" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ §4.6 VIOLATION: PathfindingService found in src/"
            echo "$VIOLATIONS"
            echo ""
            echo "PathfindingService is explicitly banned. Use TweenService + NPCNodes."
            echo "See AI_CONTEXT_MASTER §4.6"
            exit 1
          fi
          echo "✅ §4.6: PathfindingService ban verified"

  # §2.4
  # Contrato: .Name no se usa como condición lógica sobre entidades de juego
  contract-name-as-condition-banned:
    name: "Contract: .Name as condition banned (§2.4)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify .Name is not used as logical condition
        run: |
          # Detecta patrones como: if x.Name == "algo" o x.Name ~= "algo"
          VIOLATIONS=$(grep -rEn '\.Name\s*[=~]=\s*"' src/ --include="*.lua" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ §2.4 VIOLATION: .Name used as logical condition"
            echo "$VIOLATIONS"
            echo ""
            echo "Logic must operate on IDs and properties, never on string names."
            echo "See AI_CONTEXT_MASTER §2.4"
            exit 1
          fi
          echo "✅ §2.4: .Name-as-condition ban verified"

  # §4.3
  # Contrato: RemoteEvents en Networking.lua ≤ 7
  contract-remote-event-count:
    name: "Contract: RemoteEvents ≤ 7 (§4.3)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Count RemoteEvents in Networking.lua
        run: |
          if [ ! -f "src/shared/Lib/Networking.lua" ]; then
            echo "⚠ Networking.lua not found — skipping count (file not yet implemented)"
            exit 0
          fi
          # Contar solo las entradas de la tabla _remotes (nombre = grupo:WaitForChild).
          # Las búsquedas de contenedores (local Remotes = ..., local Gameplay = ...)
          # no son RemoteEvents y no deben contar para el límite.
          COUNT=$(grep -cE '^[[:space:]]*[A-Za-z_]+[[:space:]]*=[[:space:]]*[A-Za-z_]+:(WaitForChild|FindFirstChild)\(' src/shared/Lib/Networking.lua || true)
          echo "RemoteEvents found: $COUNT"
          if [ "$COUNT" -gt 7 ]; then
            echo "❌ §4.3 VIOLATION: $COUNT RemoteEvents found, maximum is 7 without PO approval"
            echo "See AI_CONTEXT_MASTER §4.3"
            exit 1
          fi
          echo "✅ §4.3: RemoteEvent count verified ($COUNT/7)"

  # ══════════════════════════════════════════════════════════════════════════════
  # BLOQUE 1B — CONTRATOS DE MANTENIBILIDAD
  # Propiedades de diseño objetivables como umbrales numéricos.
  # No son funcionales — verifican cómo está organizado el código.
  # ══════════════════════════════════════════════════════════════════════════════

  # Ningún archivo en src/ supera 400 líneas (DL-033: coste-revisor).
  # El nombre del check NO embebe el umbral: es un required status check
  # y su identidad debe ser estable ante recalibraciones (el umbral es un
  # valor Clase B; renombrar el job rompería el ruleset). Ancla: DL-033.
  contract-module-size:
    name: "Contract: Module size backstop (DL-033)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Check module line count
        run: |
          VIOLATIONS=""
          while IFS= read -r file; do
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 400 ]; then
              VIOLATIONS="${VIOLATIONS}\n  $file — ${LINES} lines"
            fi
          done < <(find src/ -name "*.lua" -not -name "*.spec.lua")

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ MODULE SIZE VIOLATION: files exceeding 400 lines:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "The real guard is single responsibility (Auditor, Nivel 3);"
            echo "this line count is a coarse backstop. See DL-033."
            exit 1
          fi
          echo "✅ Module size: all files ≤ 400 lines"

  # src/server/ no puede requerir nada de src/client/
  # Verifica separación de capas arquitectónicas
  contract-layer-separation:
    name: "Contract: Layer separation (server cannot require client)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify server does not require client modules
        run: |
          # Busca require() que apunten a StarterPlayer o client desde server
          VIOLATIONS=$(grep -rn "require.*[Ss]tarter[Pp]layer\|require.*[Cc]lient\|require.*StarterPlayerScripts" \
            src/server/ --include="*.lua" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ LAYER VIOLATION: src/server/ requires src/client/ module"
            echo "$VIOLATIONS"
            echo ""
            echo "Server modules cannot depend on client modules."
            echo "See AI_CONTEXT_MASTER §4.2"
            exit 1
          fi

          # Busca require() con paths relativos que suban a client/
          VIOLATIONS2=$(grep -rn 'require.*"\.\./client\|require.*"\.\./\.\./client' \
            src/server/ --include="*.lua" || true)
          if [ -n "$VIOLATIONS2" ]; then
            echo "❌ LAYER VIOLATION: relative require to client from server"
            echo "$VIOLATIONS2"
            exit 1
          fi
          echo "✅ Layer separation: server/client boundary verified"

  # spec files no cuentan para el límite de módulo,
  # pero sí deben existir para módulos críticos de Persistence
  contract-test-coverage-persistence:
    name: "Contract: Persistence modules have specs (MigrationService, PlayerDataService)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify critical Persistence modules have spec files
        run: |
          MISSING=""
          # ProfileStoreConfig.lua es configuración declarativa (template de datos),
          # no lógica — no requiere spec propio. ProfileStore (paquete externo) no
          # se audita con contratos del proyecto.
          CRITICAL_MODULES="MigrationService PlayerDataService"

          for module in $CRITICAL_MODULES; do
            # El módulo existe en server/Persistence/
            MODULE_FILE="src/server/Persistence/${module}.lua"
            SPEC_FILE="src/shared/Tests/${module}.spec.lua"

            if [ -f "$MODULE_FILE" ] && [ ! -f "$SPEC_FILE" ]; then
              MISSING="${MISSING}\n  ${module}: module exists but spec missing at ${SPEC_FILE}"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "❌ TEST COVERAGE VIOLATION: critical modules without specs:"
            echo -e "$MISSING"
            echo ""
            echo "Persistence modules must have TestEZ specs. See AI_CONTEXT_MASTER §4.11"
            exit 1
          fi
          echo "✅ Test coverage: all existing Persistence modules have specs"

  # ══════════════════════════════════════════════════════════════════════════════
  # BLOQUE 2 — FORMATO Y CONVENCIÓN
  # ══════════════════════════════════════════════════════════════════════════════

  format-check:
    name: "Format: StyLua"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Check formatting
        run: stylua --check src/

  lint-check:
    name: "Lint: Selene"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Generate Roblox standard library
        run: selene generate-roblox-std
      - name: Run Selene
        run: selene src/

  # Logger obligatorio (Lib/Logger.lua) — print/warn directos prohibidos.
  # Selene no puede prohibir globals específicos — este grep es el ban real.
  contract-logger-usage:
    name: "Contract: Logger usage (print/warn ban)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Verify no direct print()/warn() outside Lib/Logger.lua
        run: |
          VIOLATIONS=$(grep -rnE '(^|[^A-Za-z_.:])(print|warn)\(' src/ --include="*.lua" \
            | grep -v "src/shared/Lib/Logger.lua" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ LOGGER CONTRACT VIOLATION: direct print()/warn() found"
            echo "$VIOLATIONS"
            echo ""
            echo "Use Lib/Logger.lua (log:debug/info/warn/error) instead."
            exit 1
          fi
          echo "✅ Logger contract: no direct print()/warn() outside Logger.lua"

  # ── Nivel 1: Lune compatibility (mismo mecanismo que pre-commit) ────────────
  contract-lune-compatibility:
    name: "Contract: Lune compatibility (§4.6)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Check Lune compatibility
        run: lune run lune/check-compatibility.luau

  # ── Fase 4: specs de TestEZ headless via Lune ────────────────────────────────
  # Solo corre specs cuyos módulos pasaron contract-lune-compatibility.
  run-specs:
    name: "Tests: TestEZ specs (Lune headless)"
    runs-on: ubuntu-latest
    needs: contract-lune-compatibility
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Run TestEZ specs
        run: lune run lune/run-specs.luau

  # ── Grafo de derivación: integridad + frescura (DL-048) ──────────────────────
  # Fragmento relacional del enforcement (§2.6) formalizado como Datalog.
  # Falla solo en regresiones (stale fuera de baseline) — respeta la altitud.
  contract-derivation-graph:
    name: "Contract: Derivation graph freshness (DL-048)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Verify derivation graph integrity + freshness
        run: lune run tools/derivation-graph/check.luau

  # ── Meta-frontera: cambios al enforcement son explícitos (DL-052) ────────────
  # Evolucionar el sistema formal (validador, deferrals, workflows, hooks) es
  # una decisión META — el sistema no puede validar sus propias reglas, pero SÍ
  # puede exigir que cambiarlas sea un acto visible: la etiqueta
  # `enforcement-change`. El debilitamiento no se vuelve imposible (límite
  # operativo de una sola cuenta); se vuelve deliberado y auditable en el PR.
  contract-enforcement-change:
    name: "Contract: enforcement-change acknowledged (DL-052)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const guarded = files.filter(f =>
              f.filename.startsWith('tools/derivation-graph/') ||
              f.filename.startsWith('.github/workflows/') ||
              f.filename === 'lefthook.yml'
            );
            if (guarded.length === 0) {
              core.info('No toca rutas de enforcement.');
              return;
            }
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('enforcement-change')) {
              core.setFailed(
                'El PR modifica el enforcement (' +
                guarded.map(f => f.filename).join(', ') +
                ') sin la etiqueta `enforcement-change`. Evolucionar el sistema ' +
                'formal es una decisión meta — debe ser explícita, nunca ' +
                'silenciosa (DL-052).'
              );
            }

  # ── Validador auto-testeado: mutation tests (DL-056) ─────────────────────────
  # Cada regla del grafo de derivación debe ENCENDER ante una violación mínima
  # de su clase inyectada sobre copia del corpus real (+ control en verde).
  # Complementa el tripwire DL-052: debilitar una regla rompe su mutation test —
  # el debilitamiento silencioso muere por conducta, no solo por declaración.
  contract-validator-mutations:
    name: "Contract: validator mutation tests (DL-056)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ github.token }}
          cache: "true"
      - name: Run validator mutation tests
        run: lune run tools/derivation-graph/test.luau

  validate-commit-convention:
    name: "Convention: commitlint"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Install commitlint
        run: |
          npm install --save-dev \
            @commitlint/cli \
            @commitlint/config-conventional
      # Fuente única de verdad: .github/commitlintrc.yml (commiteado).
      # No duplicar reglas inline aquí — divergen silenciosamente.
      - name: Run commitlint
        run: |
          npx commitlint \
            --config .github/commitlintrc.yml \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  validate-pr-labels:
    name: "Labels: domain:* and class:* required"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasDomain = labels.some(l =>
              ['domain:tech','domain:design','domain:both'].includes(l)
            );
            const hasClass = labels.some(l =>
              ['class:a','class:b'].includes(l)
            );
            if (!hasDomain || !hasClass) {
              core.setFailed(
                `PR requires a domain label and a class label. Found: ${labels.join(', ') || 'none'}`
              );
              return;
            }
            // Los PRs del bot de sync tocan docs/TICKETS.md con class:b por
            // diseño (DL-030) — el warning de misclasificación no aplica.
            const headRef = context.payload.pull_request.head.ref;
            if (labels.includes('class:b') && headRef !== 'bot/sync-tickets') {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              });
              const touchesDocs = files.some(f =>
                f.filename.startsWith('docs/') && !f.filename.startsWith('docs/human/')
              );
              if (touchesDocs) {
                core.warning(
                  '⚠ Possible misclassification: PR modifies docs/ (Type B/D) with class:b.'
                );
              }
            }

  # class:a ⇒ referencia un DL y toca docs/ (trazabilidad — DL-041).
  # Nombre estable, sin umbral (§5.0, DL-033). Cierra el fallo de #44:
  # una capa arquitectonica no puede entrar como class:b sin DL ni master.
  validate-classa-traceability:
    name: "Contract: class:a traceability (DL-041)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('class:a')) {
              core.info('PR no es class:a — gate de trazabilidad no aplica.');
              return;
            }
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;
            const dlRe = /DL-\d+/;

            // (1) Referencia a un DL: en el cuerpo del PR o en algún commit.
            let hasDL = dlRe.test(pr.body || '');
            if (!hasDL) {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: number, per_page: 100,
              });
              hasDL = commits.some(c => dlRe.test(c.commit.message || ''));
            }

            // (2) Toca docs/ (§4 / DL / tickets).
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: number, per_page: 100,
            });
            const touchesDocs = files.some(f => f.filename.startsWith('docs/'));

            const problems = [];
            if (!hasDL) problems.push('no referencia ningún DL-xxx (ni en el cuerpo del PR ni en los commits)');
            if (!touchesDocs) problems.push('no modifica docs/ (un cambio Clase A actualiza §4/DL — §6.4)');

            if (problems.length > 0) {
              core.setFailed(
                'Gate de trazabilidad Clase A (DL-041) falló:\n  - ' +
                problems.join('\n  - ') +
                '\n\nUn PR class:a formaliza una decisión: referencia su DL y actualiza la ' +
                'documentación. Si el cambio no es arquitectónico, reclasifícalo a class:b.'
              );
              return;
            }
            core.info('✅ Trazabilidad Clase A: referencia DL y toca docs/.');

  # ══════════════════════════════════════════════════════════════════════════════
  # BLOQUE 3 — NOTIFICACIONES
  # ══════════════════════════════════════════════════════════════════════════════

  notify-self-review:
    name: "Notify: self-review reminder"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'ready_for_review'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## ✅ Self-review checklist',
                '',
                'CI has verified structural contracts automatically.',
                'Before requesting review, verify the acceptance criteria from your ticket:',
                '',
                '- [ ] Every acceptance criterion is **true** (binary yes/no)',
                '- [ ] No game logic outside ModuleScripts',
                '- [ ] No direct DataStore access — persistence via ProfileStore (§4.7)',
                '- [ ] Commit follows `tipo(dominio): desc` + `reason:` convention',
                '- [ ] Class A commits include `refs: DL-xxx, [DOMINIO]-xxx`',
                '',
                '_The following are already verified by CI and do not need manual check:_',
                '_Networking isolation · Audio isolation · PathfindingService ban_',
                '_.Name-as-condition ban · RemoteEvent count · print/warn ban · Format · Lint_',
              ].join('\n'),
            });

  # Post-merge: crear Issue de Codex solo para lo que CI no puede verificar
  create-codex-audit-issue:
    name: "Notify: create Codex audit issue (class:a)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('class:a')) {
              console.log('class:b — no audit issue created.');
              return;
            }
            const domainLabel = labels.find(l => l.startsWith('domain:')) || 'domain:tech';
            const domain = domainLabel.replace('domain:', '').toUpperCase();
            const pr = context.payload.pull_request;

            // Los contratos estructurales ya fueron verificados por CI.
            // Codex solo audita lo que requiere juicio sobre el código como sistema.
            const body = [
              '## Codex TECH Audit',
              '',
              '**AUDIT_MODE=TECH**',
              `**PR:** #${pr.number} — ${pr.title}`,
              `**Domain:** ${domain}`,
              `**Commit:** ${pr.merge_commit_sha}`,
              '',
              '> **Note:** The following contracts were already verified by CI and do NOT',
              '> need to be re-checked here:',
              '> INV-001 (Networking isolation) · INV-002 (Audio isolation)',
              '> §4.6 (PathfindingService) · §2.4 (.Name as condition)',
              '> §4.3 (RemoteEvent count) · Format · Lint · Commit convention',
              '',
              '---',
              '',
              '### What Codex audits here (requires judgment)',
              '',
              '**1. Coupling not captured by any contract**',
              'Does the implementation introduce implicit coupling between modules',
              'that no current contract prohibits but that would make future changes harder?',
              'If yes: describe the coupling and propose a new contract + test for it.',
              '',
              '**2. Ownership violations not detectable by grep**',
              'Does any module access or mutate state that belongs to another module,',
              'in a way that passes structural checks but violates the intent of §4.8?',
              '',
              '**3. New contract candidates**',
              'Is there a rule in this diff that is currently verified by judgment',
              'but could be expressed as a deterministic grep or TestEZ spec?',
              'If yes: describe the rule and how to implement it as CI.',
              '',
              domain === 'BOTH'
                ? '**4. Cross-domain boundary**\n' +
                  'Does the TECH change alter contracts that affect DESIGN principles or player perception (§3.7)?\n\n' +
                  '> Append `AUDITORÍA TECH COMPLETADA — DESIGN pending manual Claude activation.` at end.'
                : '',
              '',
              '---',
              '',
              '### Output format',
              'Use `docs/prompts/auditors/AUDITOR_TECH.md`.',
              'Label findings T1–T4. End with VEREDICTO.',
              '',
              '---',
              '_Created by p2-implementation.yml_',
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CODEX-AUDIT] ${pr.title} — #${pr.number}`,
              body,
              labels: ['codex-audit', 'audit:tech', domainLabel],
            });
            console.log(`Audit issue: ${issue.html_url}`);
